<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurangabad Tourism Guide</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rozha+One&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <style>
      :root {
        --color-bg-paper: #fffaf0; /* Floral White */
        --color-accent: #b45309;   /* Amber 700 */
        --color-deep: #431407;     /* Warm Dark Brown */
      }
      body {
        font-family: 'Lora', serif;
        background-color: var(--color-bg-paper);
        color: #292524;
      }
      h1, h2, h3, h4, h5, .font-heading {
        font-family: 'Rozha One', serif;
        font-weight: 400;
      }
      
      /* Decorative Background Pattern (Jaali / Lattice) */
      .bg-heritage-pattern {
        background-color: #fffaf0;
        background-image: 
          radial-gradient(#b45309 0.5px, transparent 0.5px),
          radial-gradient(#b45309 0.5px, #fffaf0 0.5px);
        background-size: 20px 20px;
        background-position: 0 0, 10px 10px;
        opacity: 1;
      }

      /* Dark Jaali Pattern for sections */
      .bg-jaali {
        background-color: #292524;
        position: relative;
      }
      .bg-jaali::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image: 
            radial-gradient(circle, rgba(180, 83, 9, 0.15) 2px, transparent 2.5px);
        background-size: 24px 24px;
        pointer-events: none;
      }

      .bg-mandala-opacity {
        position: relative;
      }
      .bg-mandala-opacity::before {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        opacity: 0.05;
        background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23b45309' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        pointer-events: none;
        z-index: 0;
      }

      /* Mughal Arch Shape */
      .arch-mask {
        clip-path: polygon(0% 100%, 0% 15%, 50% 0%, 100% 15%, 100% 100%);
        border-radius: 4px;
      }

      /* Ornamental border style */
      .border-heritage {
        border: 2px solid #b45309; 
        position: relative;
      }
      .border-heritage::after {
        content: '';
        position: absolute;
        top: 4px; left: 4px; right: 4px; bottom: 4px;
        border: 1px solid #b45309;
        pointer-events: none;
      }
      
      /* Decorative dividers */
      .divider-ornate {
        display: flex;
        align-items: center;
        text-align: center;
        color: #b45309;
      }
      .divider-ornate::before, .divider-ornate::after {
        content: '';
        flex: 1;
        border-bottom: 2px double #b45309;
      }
      .divider-ornate span {
        padding: 0 10px;
        font-size: 1.5rem;
      }

      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #fffaf0; 
      }
      ::-webkit-scrollbar-thumb {
        background: #d97706; 
        border-radius: 4px;
      }

      /* Map container styling */
      .leaflet-container {
        font-family: 'Lora', serif;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.28.0",
    "react": "https://esm.sh/react@18.2.0",
    "react/": "https://esm.sh/react@18.2.0/",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/": "https://esm.sh/react-dom@18.2.0/",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "react-router-dom": "https://esm.sh/react-router-dom@6.22.3?external=react,react-dom",
    "leaflet": "https://esm.sh/leaflet@1.9.4"
  }
}
</script>
</head>

    <div id="root"></div>

  </body>
</html>
